openapi: 3.1.0
info:
  title: Nexus Arcade Hub and Player Passport API
  version: 0.1.0
  description: Pilot V1 API for cabinet QR login, player profiles, game sessions, progression, and leaderboards.
servers:
  - url: http://localhost:3000
paths:
  /api/arcade/cabinet-login:
    post:
      summary: Create a cabinet QR pairing session
      responses:
        "201":
          description: Pairing session created
  /api/arcade/cabinet-login/{sessionId}/status:
    get:
      summary: Poll QR pairing status
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Pairing status
  /api/player/dev-login:
    post:
      summary: Create or load a V1 development Player Passport and start 2FA
      responses:
        "202":
          description: 2FA challenge created
  /api/player/dev-login/verify-2fa:
    post:
      summary: Verify Player Passport 2FA challenge and return player token
      responses:
        "200":
          description: Player Passport ready
  /api/operator/login:
    post:
      summary: Start operator 2FA challenge
      responses:
        "202":
          description: Operator 2FA challenge created
  /api/operator/verify-2fa:
    post:
      summary: Verify operator 2FA challenge and return operator session token
      responses:
        "200":
          description: Operator session ready
  /api/operator/config:
    get:
      summary: Return protected pilot runtime configuration
      security:
        - OperatorSession: []
      responses:
        "200":
          description: Operator configuration
    patch:
      summary: Update protected pilot runtime configuration
      security:
        - OperatorSession: []
      responses:
        "200":
          description: Updated operator configuration
  /api/auth/clients:
    post:
      summary: Register an OAuth/auth client for Player Passport integration
      security:
        - OperatorSession: []
      responses:
        "201":
          description: Client registered
    get:
      summary: List registered OAuth/auth clients
      security:
        - OperatorSession: []
      responses:
        "200":
          description: Client list
  /oauth/authorize:
    get:
      summary: Issue an authorization code for an authenticated Player Passport after consent
      responses:
        "302":
          description: Redirects to client callback with code
  /oauth/authorize/summary:
    get:
      summary: Return OAuth client and requested scope metadata for the consent screen
      responses:
        "200":
          description: Authorization request summary
  /oauth/token:
    post:
      summary: Exchange an authorization code for a short-lived Passport access token
      responses:
        "200":
          description: Token response
  /oauth/introspect:
    post:
      summary: Introspect a Passport access token
      responses:
        "200":
          description: Token activity and scope-filtered Player Passport payload
  /api/passport/me:
    get:
      summary: Return the scope-filtered Passport resource for a Bearer access token
      security:
        - PassportBearer: []
      responses:
        "200":
          description: Scope-filtered profile, avatar, stats, achievements, and leaderboard data
  /api/player/claim-cabinet-session:
    post:
      summary: Claim a cabinet QR session for a Player Passport
      responses:
        "200":
          description: Player assigned to cabinet slot
  /api/player/avatar/catalog:
    get:
      summary: List active 2D/3D avatar cosmetic catalog items
      responses:
        "200":
          description: Avatar cosmetic catalog
  /api/player/me:
    get:
      summary: Return the current public Player Passport profile
      responses:
        "200":
          description: Player Passport profile
  /api/player/me/avatar:
    patch:
      summary: Update avatar manifest fields such as color masks and avatar ID
      responses:
        "200":
          description: Updated Player Passport profile
  /api/player/me/inventory:
    get:
      summary: Return owned avatar cosmetics and equipped slot map
      responses:
        "200":
          description: Player avatar inventory
  /api/player/me/equipment:
    patch:
      summary: Equip an owned avatar cosmetic to a slot
      responses:
        "200":
          description: Updated profile and inventory
  /api/arcade/game-session/start:
    post:
      summary: Start a tracked game session and return launch payload
      responses:
        "201":
          description: Game session started
  /api/arcade/game-session/end:
    post:
      summary: Persist signed game result, XP, achievements, and leaderboards
      responses:
        "200":
          description: Game result saved
  /api/leaderboards/{gameId}:
    get:
      summary: List leaderboard entries for a game
      parameters:
        - in: path
          name: gameId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Leaderboard entries
components:
  securitySchemes:
    OperatorSession:
      type: apiKey
      in: header
      name: x-operator-token
    PassportBearer:
      type: http
      scheme: bearer
